name: Plan Visualizer

on:
  push:
    branches: [main, develop]
    paths:
      - 'Docs/RELEASE_PLAN.md'
      - 'Docs/TEST_CASES.md'
      - 'Docs/BUGS.md'
      - 'Docs/AI_COST_LOG.md'
      - 'progress.md'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for burndown)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate plan-status.html
        run: node tools/generate-plan.js

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Docs/plan-status.html Docs/plan-status.json
          git diff --staged --quiet || git commit -m "chore: regenerate plan-status.html [skip ci]"
          git push

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./Docs
          destination_dir: .
          keep_files: true
