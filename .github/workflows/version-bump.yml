name: Patch Version Bump

on:
  pull_request:
    types: [closed]
    branches: [develop]

jobs:
  bump:
    if: >
      github.event.pull_request.merged == true &&
      !startsWith(github.event.pull_request.head.ref, 'chore/version-bump')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: develop
          token: ${{ secrets.PAT }}

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '20'

      - name: Bump patch version and open auto-merge PR
        env:
          GH_TOKEN: ${{ secrets.PAT }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BUMP_BRANCH="chore/version-bump-$(git rev-parse --short HEAD)"
          git checkout -b "$BUMP_BRANCH"
          npm version patch --no-git-tag-version
          git add package.json package-lock.json
          git commit -m "chore: bump patch version"
          git push origin "$BUMP_BRANCH"
          gh pr create \
            --title "chore: bump patch version" \
            --body "Automated patch version bump triggered by merged PR." \
            --base develop \
            --head "$BUMP_BRANCH"
          gh pr merge "$BUMP_BRANCH" --squash --auto --delete-branch
